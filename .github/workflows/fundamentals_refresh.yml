name: Fundamentals Refresh

# Weekly refresh of the SEC EDGAR fundamentals cache (Supabase `fundamentals`, migration 016)
# that get_market_data_bulk overlays over yfinance for small-cap financials. Fundamentals change
# ~4×/yr, so weekly is ample; the read path treats rows >30d old as absent (degrades to yfinance),
# so this keeps the cache inside that bound. Unlike Daily Analysis, timing drift is irrelevant
# here, so a plain GitHub cron is fine. Also manually dispatchable.
on:
  schedule:
    - cron: "0 8 * * 0"   # Sundays 08:00 UTC
  workflow_dispatch:
    inputs:
      tickers:
        description: "Space-separated tickers to refresh (blank = held ∪ conviction set)"
        type: string
        default: ""

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check

      - name: Type check (pyright)
        run: pyright

      - name: Run tests
        run: pytest

      - name: Refresh fundamentals cache
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # SEC_USER_AGENT intentionally not passed: SEC fair-use needs a descriptive UA with a
          # contact, and an unset secret would render as "" and override the config default (which
          # carries the contact) — 403-ing SEC. The config default is correct; leave it be.
        run: python -m src.fundamentals --refresh ${{ github.event.inputs.tickers }}
