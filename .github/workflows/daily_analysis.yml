name: Daily Analysis

on:
  schedule:
    - cron: "0 13 * * 1-5"   # Weekdays 6am PT (13:00 UTC) — after US pre-market
  workflow_dispatch:           # Allow manual trigger from GitHub Actions UI

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run ASTRA analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_MCP_URL: ${{ secrets.TAVILY_MCP_URL }}
        run: python -m src.agent --mode simulation

      # Analysis output goes to Supabase only — no files committed back to repo.
