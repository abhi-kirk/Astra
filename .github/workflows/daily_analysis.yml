name: Daily Analysis

on:
  # Daily trigger is Supabase pg_cron → net.http_post → workflow_dispatch (migration 006),
  # which fires on time (GitHub's own scheduler drifted 2–3.5 hrs). Also allows manual runs.
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Decode Robinhood tokens
        env:
          ROBINHOOD_TOKENS_ENC: ${{ secrets.ROBINHOOD_TOKENS_ENC }}
        run: |
          if [ -n "$ROBINHOOD_TOKENS_ENC" ]; then
            echo "$ROBINHOOD_TOKENS_ENC" | base64 -d > tokens.enc
          fi

      - name: Run ASTRA analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_MCP_URL: ${{ secrets.TAVILY_MCP_URL }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ROBINHOOD_TOKEN_KEY: ${{ secrets.ROBINHOOD_TOKEN_KEY }}
          ROBINHOOD_ACCOUNT_NUMBER: ${{ secrets.ROBINHOOD_ACCOUNT_NUMBER }}
        run: python -m src.agent --mode simulation

      # Analysis output goes to Supabase only — no files committed back to repo.
