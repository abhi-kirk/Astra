name: Weekly Exploration

on:
  schedule:
    - cron: "0 1 * * 6"   # Saturday 1am UTC = Friday 9pm ET (after market close)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  explore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run exploration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_MCP_URL: ${{ secrets.TAVILY_MCP_URL }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python -m src.exploration

      # Output goes to Supabase exploration_candidates table only — no files committed.
